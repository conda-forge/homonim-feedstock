{% set name = "homonim" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/homonim-{{ version }}.tar.gz
  sha256: 5401260cf01a3911a3a3891a5e53713a7d3d0ccf72f6b4094de433263ed70ee3

build:
  entry_points:
    - homonim=homonim.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - click >=8
    - numpy >=1.19
    - opencv >=4.5
    - python >={{ python_min }}
    - pyyaml >=5.4
    - rasterio >=1.1
    - tqdm >=4.6
    - cloup >=0.15
    - tabulate >=0.8

test:
  imports:
    - homonim
  commands:
    - pip check
    - homonim --help
  requires:
    - pip
    - libopencv *=headless*  # [linux]
    - python {{ python_min }}

about:
  summary: Correct drone, aerial and satellite imagery to surface reflectance.
  license: AGPL-3.0-only
  license_file: LICENSE
  home: https://github.com/leftfield-geospatial/homonim
  dev_url: https://github.com/leftfield-geospatial/homonim
  doc_url: https://homonim.readthedocs.io

extra:
  recipe-maintainers:
    - dugalh
